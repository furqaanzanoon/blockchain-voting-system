<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <defs>
    <linearGradient id="chain" x1="0" y1="0" x2="32" y2="32" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
  </defs>

  <!-- Chain block left -->
  <rect x="2" y="11" width="10" height="10" rx="2.5" stroke="url(#chain)" stroke-width="2.2" fill="none"/>
  <!-- Chain link connector -->
  <rect x="11.5" y="14" width="9" height="4" rx="2" fill="url(#chain)"/>
  <!-- Chain block right -->
  <rect x="20" y="11" width="10" height="10" rx="2.5" stroke="url(#chain)" stroke-width="2.2" fill="none"/>

  <!-- Green vote checkmark below -->
  <path d="M9 25 L13 29 L23 21" stroke="#34d399" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>